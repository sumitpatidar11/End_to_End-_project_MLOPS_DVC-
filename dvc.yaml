stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
    - src/data_ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - data/raw

  data_preprocessing:
    cmd:
    - python src/data_preprocessing
    deps:
    - src/data_preprocessing
    outs:
    - data/interim

  feature_engineering:
    cmd:
    - python src/feature_engineering
    deps:
    - src/feature_enginneering
    params:
    - feature_engineering.max_features
    outs:
    - data/processed

  model_building:
    cmd:
    - python src/model_building
    deps:
    - src/model_building
    params:
    - model_building.n_estimators
    - model_building.random_state
    outs:
    - models/model.pkl
  
  model_evaluation:
    cmd:
    - python src/model_evaluation.py
    deps:
    - models/model.pkl
    - src/model_evaluation.py
    metrics:
    - reports/metrics.json

params:
- dvclive/params.yaml
metrics:
- dvclive/metrics.json
plots:
- dvclive/plots/metrics:
    x: step
